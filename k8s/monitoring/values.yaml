# Prometheus Stack Helm Values for Self-Healing AKS
# Install: helm install monitoring prometheus-community/kube-prometheus-stack -f values.yaml -n monitoring

prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    
    # Additional scrape configs
    additionalScrapeConfigs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true

alertmanager:
  config:
    global:
      resolve_timeout: 5m
    
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'logic-app-webhook'
      routes:
        - match:
            severity: critical
          receiver: 'logic-app-webhook'
          continue: true
    
    receivers:
      - name: 'logic-app-webhook'
        webhook_configs:
          - url: 'LOGIC_APP_WEBHOOK_URL'  # Replace with actual Logic App URL
            send_resolved: true

grafana:
  enabled: true
  adminPassword: "prom-operator"  # Change in production
  
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'self-healing'
          orgId: 1
          folder: 'Self-Healing'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/self-healing

  persistence:
    enabled: true
    size: 5Gi

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

